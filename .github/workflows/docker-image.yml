name: Build Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout your repo (Dockerfile)
      uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t my-easytv-image .

    # 可选步骤：推送到 Docker Hub（需配置 secrets）
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker image
      run: |
        docker tag my-easytv-image ${{ secrets.DOCKER_USERNAME }}/my-easytv:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/my-easytv:latest
